<!DOCTYPE html>
<html>
<head>
  <title>AI Resume Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Resume & Cover Letter Generator</h1>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="role" placeholder="Job Role">
<textarea id="skills" placeholder="Skills (comma separated)"></textarea>
<textarea id="experience" placeholder="Experience"></textarea>

<button onclick="generate()">Generate</button>

<h2>Resume</h2>
<div id="resume"></div>

<h2>Cover Letter</h2>
<div id="coverLetter"></div>

<script src="script.js"></script>
</body>
</html>
